  <style>
    body { font-family: 'Segoe UI', system-ui, sans-serif; background: #1f2937; color: #f3f4f6; }

    .tab-btn.active { background: #374151; border-bottom: 3px solid #f472b6; }

    .cat-card:hover { transform: scale(1.02); background: #374151; }
    .btn { padding: 0.5rem 1rem; border-radius: 0.5rem; font-weight: 600; cursor: pointer; transition: opacity 0.2s; border: none; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-pink { background: #ec4899; color: white; }

    .notification-dot { position: absolute; top: -5px; right: -5px; background: #ef4444; color: white; border-radius: 50%; width: 18px; height: 18px; font-size: 0.7rem; display: flex; align-items: center; justify-content: center; }

    .park-game, .castle-game, .forest-game, .beach-game { position: relative; width: 100%; height: 200px; overflow: hidden; }
    .park-game { background: #7f1d1d; }
    .castle-game { background: #4a3f35; }
    .forest-game { background: #1e3a2f; }
    .beach-game { background: #2563eb; }
    .park-zone { position: absolute; width: 60px; height: 100%; background: #166534; left: 50%; transform: translateX(-50%); }
    .park-cat { position: absolute; font-size: 2rem; transition: left 0.15s linear; }
    .castle-target { position: absolute; width: 40px; height: 40px; background: gold; border-radius: 50%; animation: fall 2s linear infinite; }
    .forest-firefly { position: absolute; width: 15px; height: 15px; background: #fde047; border-radius: 50%; box-shadow: 0 0 10px #fde047; animation: fireflyMove 1.5s infinite alternate; }
    .beach-wave { position: absolute; width: 100%; height: 40px; background: #3b82f6; bottom: 0; animation: waveMove 2s linear infinite; }
    @keyframes fall { from { top: -40px; } to { top: 100%; } }
    @keyframes fireflyMove { from { transform: translateY(0); } to { transform: translateY(-10px); } }
    @keyframes waveMove { 0% { transform: translateX(0); } 100% { transform: translateX(-50px); } }
    body.mobile .cat-card { width: 100% !important; }
    body.mobile .btn { padding: 0.75rem 1.25rem; font-size: 1rem; }
    body.mobile .tab-btn { font-size: 0.8rem; }
    body.mobile #app { max-width: 100% !important; }
    body.mobile .modal-content { width: 95% !important; max-width: 95% !important; }
  </style>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyDfNf9qrvFMcdNJxkMzug8Roin7WjEPLO0",
      authDomain: "cat-genetics-v32.firebaseapp.com",
      projectId: "cat-genetics-v32",
      storageBucket: "cat-genetics-v32.firebasestorage.app",
      messagingSenderId: "376660639748",
      appId: "1:376660639748:web:50c3f04abd1911f4dfb551",
      measurementId: "G-0DFM5X6EBG"
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    let currentUser = null, currentTab = 'home', timeInterval = null, notificationsListener = null, gameMinutes = 360;
    let isProcessing = false;

    const COLORS = ['белый','чёрный','рыжий','серый','кремовый','шоколадный','золотой','серебристый'];
    const PATTERNS = ['однотонный','табби','пятнистый','мраморный','колорпойнт','черепаховый','тигровый'];
    const EYE_COLORS = ['голубой','зелёный','жёлтый','карий','красно-розовый','фиолетовый','оранжевый'];
    const CHARACTERS = ['спокойный','игривый','ленивый','любопытный','независимый','ласковый'];
    const FUR_TYPES = ['короткошёрстный','длинношёрстный'];
    const ITEMS = [
      { type:'ball', name:'Мячик' },
      { type:'accelerator', name:'Ускоритель беременности' },
      { type:'golden_fish', name:'Золотая рыбка', desc:'Мгновенно завершает беременность' },
      { type:'catnip', name:'Кошачья мята', desc:'Снимает усталость +10 монет' },
      { type:'amulet', name:'Амулет удачи', desc:'Шанс редкого окраса +20%' },
      { type:'collar', name:'Ошейник силы', desc:'Не устаёт после прогулок 2 раза' },
      { type:'crystal', name:'Магический кристалл', desc:'Переименовать кота' },
      { type:'forest_amulet', name:'Лесной амулет', desc:'Привлекает светлячков' },
      { type:'shell', name:'Ракушка', desc:'С шумом моря' },
      { type:'medicine', name:'Лечебное лекарство', desc:'Лечит болезнь' }
    ];

    const MUTATIONS = {
      albinism: { name:'альбинизм', chance:1, apply(cat){ cat.mainColor='белый'; cat.pattern='однотонный'; cat.eyeColor='красно-розовый'; cat.secondaryColor=null; } },
      heterochromia: { name:'гетерохромия', chance:5, apply(cat){ cat.eyeColor={type:'разные',colors:[randomEye(),randomEye()]}; } },
      vitiligo: { name:'витилиго', chance:3, apply(cat){ cat.pattern='пятнистый'; cat.mainColor+=' (осветлённые пятна)'; } },
      chimerism: { name:'химеризм', chance:1, apply(cat){ cat.pattern='наполовину разный'; cat.secondaryColor=randomColor(); } },
      polydactyly: { name:'полидактилия', chance:4, apply(cat){ cat.paws='многопалые'; } },
      bobtail: { name:'бобтейл', chance:4, apply(cat){ cat.tail='короткий'; } },
      ghost: { name:'призрачный', chance:2, apply(cat){ cat.ghost=true; } }
    };

    function randomColor(){ return COLORS[Math.floor(Math.random()*COLORS.length)]; }
    function randomEye(){ return EYE_COLORS[Math.floor(Math.random()*EYE_COLORS.length)]; }
    function randomFur(){ return FUR_TYPES[Math.floor(Math.random()*FUR_TYPES.length)]; }

    function applyMutations(cat){
      const muts = [];
      if(Math.random()*100 < MUTATIONS.albinism.chance){
        MUTATIONS.albinism.apply(cat); muts.push('альбинизм');
      } else {
        if(Math.random()*100 < MUTATIONS.heterochromia.chance){ MUTATIONS.heterochromia.apply(cat); muts.push('гетерохромия'); }
        if(Math.random()*100 < MUTATIONS.vitiligo.chance){ MUTATIONS.vitiligo.apply(cat); muts.push('витилиго'); }
        if(Math.random()*100 < MUTATIONS.chimerism.chance){
          MUTATIONS.chimerism.apply(cat); muts.push('химеризм');
          if(Math.random()*100 < 15){ MUTATIONS.heterochromia.apply(cat); muts.push('гетерохромия'); }
        }
      }
      if(Math.random()*100 < MUTATIONS.polydactyly.chance){ MUTATIONS.polydactyly.apply(cat); muts.push('полидактилия'); }
      if(Math.random()*100 < MUTATIONS.bobtail.chance){ MUTATIONS.bobtail.apply(cat); muts.push('бобтейл'); }
      if(Math.random()*100 < MUTATIONS.ghost.chance){ MUTATIONS.ghost.apply(cat); muts.push('призрачный'); }
      cat.mutations = muts;
    }

    function inheritMutations(mother, father){
      const shared = mother.mutations.filter(m=>father.mutations.includes(m));
      const unique = [...new Set([...mother.mutations, ...father.mutations])];
      const result = [];
      shared.forEach(m=>{ if(Math.random()*100 < 90) result.push(m); });
      unique.forEach(m=>{ if(!result.includes(m) && Math.random()*100 < 10) result.push(m); });
      return result;
    }

    function generateRandomCat(age='взрослый'){
      const cat = {
        gender: Math.random()<0.5?'male':'female', age, state:'лежит',
        mainColor: randomColor(), pattern: PATTERNS[Math.floor(Math.random()*PATTERNS.length)],
        eyeColor: randomEye(), character: CHARACTERS[Math.floor(Math.random()*CHARACTERS.length)],
        secondaryColor: null, isPregnant: false, pregnancyEnd: null, tiredUntil: null, birthCount: 0,
        motherId: null, fatherId: null, mutations: [], paws:'норма', tail:'норма', ghost:false,
        furType: randomFur(), sick: false
      };
      if(cat.pattern==='однотонный') cat.secondaryColor=null;
      applyMutations(cat);
      return cat;
    }

    function generateKittenFromParents(mother, father, motherId, fatherId){
      const kitten = {
        gender: Math.random()<0.5?'male':'female', age:'котёнок', state:'лежит',
        mainColor: getInheritedColor(mother.mainColor, father.mainColor),
        pattern: getInheritedPattern(mother.pattern, father.pattern),
        eyeColor: getInheritedEyeColor(mother.eyeColor, father.eyeColor),
        character: CHARACTERS[Math.floor(Math.random()*CHARACTERS.length)],
        secondaryColor: null, isPregnant:false, pregnancyEnd:null, tiredUntil:null, birthCount:0,
        motherId, fatherId, mutations:[], paws:'норма', tail:'норма', ghost:false,
        furType: Math.random()<0.5 ? mother.furType : father.furType, sick: false,
        adultAt: firebase.firestore.Timestamp.fromDate(new Date(Date.now() + 5*60000))
      };
      if(mother.secondaryColor && father.secondaryColor)
        kitten.secondaryColor = Math.random()<0.5? mother.secondaryColor : father.secondaryColor;
      else if(mother.secondaryColor || father.secondaryColor)
        kitten.secondaryColor = Math.random()<0.4? (mother.secondaryColor||father.secondaryColor) : null;
      if(kitten.pattern==='однотонный' || kitten.mutations.includes('витилиго')) kitten.secondaryColor=null;
      kitten.mutations = inheritMutations(mother, father);
      if(kitten.mutations.length===0) applyMutations(kitten);
      return kitten;
    }

    const colorInheritance = {
      'чёрный_чёрный':[{c:'чёрный',p:80},{c:'серый',p:15},{c:'белый',p:5}],
      'чёрный_серый':[{c:'чёрный',p:50},{c:'серый',p:40},{c:'белый',p:10}],
      'чёрный_белый':[{c:'белый',p:40},{c:'чёрный',p:40},{c:'серый',p:20}],
      'чёрный_рыжий':[{c:'чёрный',p:45},{c:'рыжий',p:45},{c:'серый',p:10}],
      'чёрный_кремовый':[{c:'чёрный',p:40},{c:'кремовый',p:40},{c:'серый',p:20}],
      'чёрный_шоколадный':[{c:'чёрный',p:55},{c:'шоколадный',p:35},{c:'серый',p:10}],
      'чёрный_золотой':[{c:'чёрный',p:50},{c:'золотой',p:30},{c:'рыжий',p:20}],
      'чёрный_серебристый':[{c:'чёрный',p:45},{c:'серебристый',p:35},{c:'серый',p:20}],
      'серый_серый':[{c:'серый',p:70},{c:'чёрный',p:15},{c:'белый',p:15}],
      'серый_белый':[{c:'серый',p:50},{c:'белый',p:30},{c:'чёрный',p:20}],
      'серый_рыжий':[{c:'серый',p:40},{c:'рыжий',p:40},{c:'чёрный',p:20}],
      'серый_кремовый':[{c:'серый',p:40},{c:'кремовый',p:40},{c:'белый',p:20}],
      'серый_шоколадный':[{c:'серый',p:45},{c:'шоколадный',p:35},{c:'чёрный',p:20}],
      'серый_золотой':[{c:'серый',p:40},{c:'золотой',p:35},{c:'рыжий',p:25}],
      'серый_серебристый':[{c:'серый',p:40},{c:'серебристый',p:40},{c:'белый',p:20}],
      'белый_белый':[{c:'белый',p:90},{c:'серый',p:10}],
      'белый_рыжий':[{c:'белый',p:40},{c:'рыжий',p:40},{c:'кремовый',p:20}],
      'белый_кремовый':[{c:'белый',p:40},{c:'кремовый',p:40},{c:'серый',p:20}],
      'белый_шоколадный':[{c:'белый',p:40},{c:'шоколадный',p:35},{c:'серый',p:25}],
      'белый_золотой':[{c:'белый',p:40},{c:'золотой',p:35},{c:'кремовый',p:25}],
      'белый_серебристый':[{c:'белый',p:40},{c:'серебристый',p:40},{c:'серый',p:20}],
      'рыжий_рыжий':[{c:'рыжий',p:80},{c:'кремовый',p:15},{c:'белый',p:5}],
      'рыжий_кремовый':[{c:'рыжий',p:45},{c:'кремовый',p:45},{c:'белый',p:10}],
      'рыжий_шоколадный':[{c:'рыжий',p:40},{c:'шоколадный',p:30},{c:'чёрный',p:30}],
      'рыжий_золотой':[{c:'рыжий',p:40},{c:'золотой',p:40},{c:'кремовый',p:20}],
      'рыжий_серебристый':[{c:'рыжий',p:40},{c:'серебристый',p:30},{c:'серый',p:30}],
      'кремовый_кремовый':[{c:'кремовый',p:80},{c:'белый',p:15},{c:'рыжий',p:5}],
      'кремовый_шоколадный':[{c:'кремовый',p:40},{c:'шоколадный',p:35},{c:'серый',p:25}],
      'кремовый_золотой':[{c:'кремовый',p:35},{c:'золотой',p:40},{c:'рыжий',p:25}],
      'кремовый_серебристый':[{c:'кремовый',p:40},{c:'серебристый',p:35},{c:'белый',p:25}],
      'шоколадный_шоколадный':[{c:'шоколадный',p:80},{c:'чёрный',p:15},{c:'серый',p:5}],
      'шоколадный_золотой':[{c:'шоколадный',p:45},{c:'золотой',p:35},{c:'рыжий',p:20}],
      'шоколадный_серебристый':[{c:'шоколадный',p:45},{c:'серебристый',p:35},{c:'серый',p:20}],
      'золотой_золотой':[{c:'золотой',p:80},{c:'рыжий',p:15},{c:'кремовый',p:5}],
      'золотой_серебристый':[{c:'золотой',p:40},{c:'серебристый',p:40},{c:'серый',p:20}],
      'серебристый_серебристый':[{c:'серебристый',p:80},{c:'серый',p:15},{c:'белый',p:5}]
    };

    function getInheritedColor(mc, fc){
      if(mc===fc) return mc;
      const key1=`${mc}_${fc}`, key2=`${fc}_${mc}`;
      const entry=colorInheritance[key1]||colorInheritance[key2];
      if(entry) return pickFromProb(entry);
      return Math.random()<0.5?mc:fc;
    }
    function getInheritedPattern(mp, fp){
      if(mp===fp) return Math.random()<0.8?mp:PATTERNS[Math.floor(Math.random()*PATTERNS.length)];
      return Math.random()<0.5?mp:fp;
    }
    function getInheritedEyeColor(me, fe){
      const mc=typeof me==='object'?me.colors[0]:me;
      const fc=typeof fe==='object'?fe.colors[0]:fe;
      if(mc===fc) return Math.random()<0.8?mc:randomEye();
      return Math.random()<0.5?mc:fc;
    }
    function pickFromProb(arr){ const r=Math.random()*100; let cum=0; for(const i of arr){ cum+=i.p; if(r<=cum) return i.c; } return arr[arr.length-1].c; }

    async function getNextGlobalCatId(){
      const ref=db.collection('server').doc('counters');
      return db.runTransaction(async t=>{
        const doc=await t.get(ref);
        const next=(doc.exists?doc.data().nextCatId||0:0)+1;
        t.set(ref,{nextCatId:next},{merge:true});
        return String(next).padStart(4,'0');
      });
    }
    async function getNextPlayerId(){
      const ref=db.collection('server').doc('playerCounter');
      return db.runTransaction(async t=>{
        const doc=await t.get(ref);
        const next=(doc.exists?doc.data().nextPlayerId||0:0)+1;
        t.set(ref,{nextPlayerId:next},{merge:true});
        return next;
      });
    }

    function updateGameTimeDisplay(){
      const h=Math.floor(gameMinutes/60)%24, m=gameMinutes%60;
      document.getElementById('game-time').textContent=`${h>=6&&h<18?'☀️':'🌃'} ${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}`;
    }
    function incrementGameTime(){ gameMinutes++; updateGameTimeDisplay(); }
    function updateAllTimers(){
      document.querySelectorAll('.adult-timer-home').forEach(el=>{ el.textContent='⌚ '+timeLeftStr(new Date(el.dataset.until)); });
      document.querySelectorAll('.tired-timer-home').forEach(el=>{ el.textContent='⌚ '+timeLeftStr(new Date(el.dataset.until)); });
    }
    function timeLeftStr(until){ const diff=until-new Date(); if(diff<=0) return 'готово'; const m=Math.floor(diff/60000),s=Math.floor((diff%60000)/1000); return `${m}:${String(s).padStart(2,'0')}`; }

    async function startBreeding(){
      if(isProcessing) return; isProcessing=true;
      const m=document.getElementById('mother-select')?.value, f=document.getElementById('father-select')?.value;
      if(!m||!f){ alert('Выберите родителей'); return; }

      try{
        const motherDoc=await db.collection('cats').doc(m).get(), fatherDoc=await db.collection('cats').doc(f).get();
        const mother=motherDoc.data(), father=fatherDoc.data();
        if(mother.state!=='лежит'||mother.sick){ alert('Кошка занята, устала или болеет'); return; }
        if(father.state!=='лежит'||father.sick){ alert('Кот занят, устал или болеет'); return; }

        if(relation==='близкий родственник'){ alert('Эти коты не могут иметь котят, так как они родственники'); return; }

    }

    async function checkRelation(catId1, catId2){
      const ancestors=new Set();
      const collect=async (id, depth=0)=>{
        if(depth>4) return;
        const doc=await db.collection('cats').doc(id).get();
        if(!doc.exists) return;
        const data=doc.data();
        if(data.motherId){ ancestors.add(data.motherId); await collect(data.motherId,depth+1); }
        if(data.fatherId){ ancestors.add(data.fatherId); await collect(data.fatherId,depth+1); }
      };
      await collect(catId1);
      if(ancestors.has(catId2)) return 'близкий родственник';
      ancestors.clear();
      await collect(catId2);
      if(ancestors.has(catId1)) return 'близкий родственник';
      const cat1=await db.collection('cats').doc(catId1).get(), cat2=await db.collection('cats').doc(catId2).get();
      if(cat1.data().motherId && cat1.data().motherId===cat2.data().motherId) return 'близкий родственник';
      if(cat1.data().fatherId && cat1.data().fatherId===cat2.data().fatherId) return 'близкий родственник';
      return 'дальний';
    }

      html+=`<div class="bg-gray-700 p-2 rounded mb-2">Котов: ${partnerOffer.cats.length?partnerOffer.cats.join(', '):'нет'}</div>`;
      html+=`<div class="bg-gray-700 p-2 rounded mb-2">Предметов: ${partnerOffer.items.length?partnerOffer.items.join(', '):'нет'}</div>`;

      html+=`<div class="flex space-x-2 mt-3">${!iAccepted?`<button id="accept-btn" class="btn btn-pink">Принять</button>`:`<button id="cancel-accept-btn" class="btn btn-gray">Отмена принять</button>`}<button id="reject-btn" class="btn" style="background:#b91c1c;">Отклонить</button></div>`;
      container.innerHTML=html;
      document.getElementById('my-coins')?.addEventListener('change',e=>{ db.collection('trades').doc(tradeId).update({ [`offers.${currentUser.uid}.coins`]:Math.max(0,parseInt(e.target.value)||0) }); });

      document.getElementById('reject-btn')?.addEventListener('click',()=>{ db.collection('trades').doc(tradeId).update({ status:'cancelled' }); document.getElementById('trade-modal').classList.remove('active'); });

      db.collection('users').doc(currentUser.uid).collection('notifications').where('read','==',false).get().then(notifs=>{
        let html='<div class="flex justify-between items-center mb-2"><h2>📬 Уведомления</h2><button id="clear-all-btn" class="text-red-400 text-sm">🗑 Очистить все</button></div>';
        notifs.forEach(doc=>{ const n=doc.data(); html+=`<div class="bg-gray-700 p-2 rounded mb-2 flex justify-between"><span>${n.message}</span>`; if(n.type==='pregnancy_tracking') html+=`<button data-action="track-pregnancy" data-end="${n.pregnancyEnd.toDate().toISOString()}" class="text-blue-400">👁</button>`; else if(n.type==='birth_ready') html+=`<button data-action="accept-birth" data-mother-id="${n.motherId}" data-father-id="${n.fatherId}" class="text-pink-400">💥</button>`; else if(n.type==='walking') html+=`<button data-action="track-walking" data-end="${n.returnTime.toDate().toISOString()}" class="text-blue-400">👁</button>`; else if(n.type==='walk_return') html+=`<button data-action="open-door" data-cat-id="${n.catId}" class="text-green-400">🚪</button>`; else if(n.type==='castle_expedition') html+=`<button data-action="track-castle" data-end="${n.returnTime.toDate().toISOString()}" class="text-blue-400">👁</button>`; else if(n.type==='castle_return') html+=`<button data-action="open-castle-door" data-cat-id="${n.catId}" class="text-green-400">🚪</button>`; else if(n.type==='forest_expedition') html+=`<button data-action="track-forest" data-end="${n.returnTime.toDate().toISOString()}" class="text-blue-400">👁</button>`; else if(n.type==='forest_return') html+=`<button data-action="open-forest-door" data-cat-id="${n.catId}" class="text-green-400">🚪</button>`; else if(n.type==='beach_expedition') html+=`<button data-action="track-beach" data-end="${n.returnTime.toDate().toISOString()}" class="text-blue-400">👁</button>`; else if(n.type==='beach_return') html+=`<button data-action="open-beach-door" data-cat-id="${n.catId}" class="text-green-400">🚪</button>`; else if(n.type==='adult') html+=`<button data-action="view-cat" data-cat-id="${n.catId}" class="text-yellow-400">👀</button>`; html+=`</div>`; });
        html+='<button class="btn btn-gray mt-2" onclick="document.getElementById(\'message-modal\').classList.remove(\'active\')">Закрыть</button>';
        content.innerHTML=html; modal.classList.add('active');
        document.getElementById('clear-all-btn')?.addEventListener('click',async ()=>{ const batch=db.batch(); notifs.forEach(d=>batch.delete(d.ref)); await batch.commit(); modal.classList.remove('active'); });
      });
    }

    async function openBirthModal(motherId, fatherId){
      try{
        const motherDoc=await db.collection('cats').doc(motherId).get(); const mother=motherDoc.data();
        const fatherDoc=fatherId!=='unknown'?await db.collection('cats').doc(fatherId).get():null; const father=fatherDoc?.exists?fatherDoc.data():null;
        const birthCount=mother.birthCount||0; const maxK=birthCount===0?3:5; const kittenCount=Math.floor(Math.random()*(maxK-1+1))+1;
        const kittens=[];
        for(let i=0;i<kittenCount;i++){ if(father) kittens.push(generateKittenFromParents(mother,father,motherId,fatherId)); else{ const rCat=generateRandomCat('котёнок'); rCat.motherId=motherId; rCat.fatherId=null; rCat.adultAt=firebase.firestore.Timestamp.fromDate(new Date(Date.now()+5*60000)); kittens.push(rCat); } kittens[i].idNumber=await getNextGlobalCatId(); }
        const modal=document.getElementById('birth-modal'), content=document.getElementById('birth-modal-content');
        let html=`<h2>💥 Роды! (${kittenCount} котёнка)</h2><div class="grid grid-cols-3 gap-3">`;
        kittens.forEach((k,i)=>{ html+=`<div class="bg-gray-700 p-3 rounded-lg text-center" id="kitten-${i}"><p>🐱</p><p>${k.mainColor}</p><p>${k.pattern}</p><p>{${k.gender==='male'?'мальчик':'девочка'}}</p><button class="btn btn-pink mt-2 select-kitten-btn" data-idx="${i}">Выбрать</button></div>`; });
        html+='</div><div id="naming-area" class="mt-3"></div>';
        content.innerHTML=html; modal.classList.add('active');
        window._kittens=kittens; window._namedCount=0; window._kittenNames=new Array(kittenCount).fill('');
        content.querySelectorAll('.select-kitten-btn').forEach(b=>b.addEventListener('click',e=>{
          const idx=e.target.dataset.idx; if(window._kittenNames[idx]!=='') return;
          document.getElementById('naming-area').innerHTML=`<input id="kitten-name-input" placeholder="Имя" class="w-full p-2 rounded bg-gray-700 mb-2"><button id="name-kitten-btn" class="btn btn-pink">Назвать</button>`;
          document.getElementById('name-kitten-btn').addEventListener('click',()=>{
            const name=document.getElementById('kitten-name-input').value.trim(); if(!name) return alert('Введите имя');
            window._kittenNames[idx]=name; window._namedCount++;
            document.getElementById(`kitten-${idx}`).querySelector('.select-kitten-btn').classList.add('hidden');
            document.getElementById(`kitten-${idx}`).innerHTML+=`<p class="text-green-400">${name}</p>`; document.getElementById('naming-area').innerHTML='';
            if(window._namedCount===kittenCount){
              document.getElementById('naming-area').innerHTML='<button id="finish-birth" class="btn btn-pink mt-3">✅ Завершить</button>';
              document.getElementById('finish-birth').addEventListener('click',async ()=>{
                if(isProcessing) return; isProcessing=true;
                try{
                  for(let i=0;i<kittenCount;i++){ window._kittens[i].name=window._kittenNames[i]; window._kittens[i].owner=currentUser.uid; await db.collection('cats').add(window._kittens[i]); }
                  const sick = Math.random()*100 < 5;
                  const tiredUntil=new Date(Date.now()+3*60000);
                  const update = { isPregnant:false, state:'уставшая', pregnancyEnd:null, tiredUntil:firebase.firestore.Timestamp.fromDate(tiredUntil), birthCount:(mother.birthCount||0)+1 };
                  if(sick) update.sick = true;
                  await db.collection('cats').doc(motherId).update(update);
                  const notifs=await db.collection('users').doc(currentUser.uid).collection('notifications').where('motherId','==',motherId).where('type','==','birth_ready').get();
                  notifs.forEach(d=>d.ref.delete()); modal.classList.remove('active'); updateCoinsDisplay(); switchTab('home');
                  if(sick) alert('Кошка заболела после родов! 🤒');
                } catch(e){ alert('Ошибка: '+e.message); } finally{ isProcessing=false; }
              });
            }
          });
        }));
      } catch(e){ alert('Ошибка родов: '+e.message); }
    }

    function openTrackingModal(endTime){
      const modal=document.getElementById('tracking-modal'), content=document.getElementById('tracking-modal-content');
      const update=()=>{ const diff=endTime-new Date(); if(diff<=0){ content.innerHTML='<p>Время истекло!</p>'; return; } const m=Math.floor(diff/60000), s=Math.floor((diff%60000)/1000); content.innerHTML=`<h2>⏳ Ожидание</h2><p class="countdown">${m}:${String(s).padStart(2,'0')}</p><button class="btn btn-gray mt-2" onclick="document.getElementById('tracking-modal').classList.remove('active')">Закрыть</button>`; modal.classList.add('active'); };
      update(); const int=setInterval(()=>{ if(modal.classList.contains('active')) update(); else clearInterval(int); },1000);
    }

    // ==================== ГЛОБАЛЬНОЕ ДЕЛЕГИРОВАНИЕ ====================
    document.addEventListener('click',e=>{
      if(e.target.classList.contains('modal')){ e.target.classList.remove('active'); return; }
      const catLink=e.target.closest('[data-cat-id]'); if(catLink){ openCatView(catLink.dataset.catId); return; }
      if(e.target.closest('#breed-btn')){ startBreeding(); return; }
      const birthAction=e.target.closest('[data-action="accept-birth"]'); if(birthAction){ document.getElementById('message-modal').classList.remove('active'); openBirthModal(birthAction.dataset.motherId,birthAction.dataset.fatherId); return; }
      const trackAction=e.target.closest('[data-action="track-pregnancy"]'); if(trackAction){ document.getElementById('message-modal').classList.remove('active'); openTrackingModal(new Date(trackAction.dataset.end)); return; }
      const walkTrack=e.target.closest('[data-action="track-walking"]'); if(walkTrack){ document.getElementById('message-modal').classList.remove('active'); openTrackingModal(new Date(walkTrack.dataset.end)); return; }
      const doorAction=e.target.closest('[data-action="open-door"]'); if(doorAction){ document.getElementById('message-modal').classList.remove('active'); openDoor(doorAction.dataset.catId); return; }
      const castleTrack=e.target.closest('[data-action="track-castle"]'); if(castleTrack){ document.getElementById('message-modal').classList.remove('active'); openTrackingModal(new Date(castleTrack.dataset.end)); return; }
      const castleDoor=e.target.closest('[data-action="open-castle-door"]'); if(castleDoor){ document.getElementById('message-modal').classList.remove('active'); openCastleDoor(castleDoor.dataset.catId); return; }
      const forestTrack=e.target.closest('[data-action="track-forest"]'); if(forestTrack){ document.getElementById('message-modal').classList.remove('active'); openTrackingModal(new Date(forestTrack.dataset.end)); return; }
      const forestDoor=e.target.closest('[data-action="open-forest-door"]'); if(forestDoor){ document.getElementById('message-modal').classList.remove('active'); openForestDoor(forestDoor.dataset.catId); return; }
      const beachTrack=e.target.closest('[data-action="track-beach"]'); if(beachTrack){ document.getElementById('message-modal').classList.remove('active'); openTrackingModal(new Date(beachTrack.dataset.end)); return; }
      const beachDoor=e.target.closest('[data-action="open-beach-door"]'); if(beachDoor){ document.getElementById('message-modal').classList.remove('active'); openBeachDoor(beachDoor.dataset.catId); return; }
      const viewCat=e.target.closest('[data-action="view-cat"]'); if(viewCat){ document.getElementById('message-modal').classList.remove('active'); openCatView(viewCat.dataset.catId); return; }
      const compareBtn=e.target.closest('.compare-btn'); if(compareBtn){ showCompareModal(compareBtn.dataset.catId); return; }
    });

    // ==================== ФОНОВЫЕ ЗАДАЧИ ====================
    async function botCatRespawn(){
      const snap=await db.collection('sales').where('bot','==',true).where('active','==',true).get();
      if(snap.size>=3) return;
      const now=new Date();
      snap.forEach(async d=>{ if(d.data().createdAt&&(now-d.data().createdAt.toDate())>3600000){ await db.collection('cats').doc(d.data().catId).delete(); await d.ref.delete(); } });
      if(snap.size<3){ const cat=generateRandomCat(Math.random()<0.5?'котёнок':'взрослый'); cat.name='Безымянный'; if(cat.age==='котёнок') cat.adultAt=firebase.firestore.Timestamp.fromDate(new Date(now.getTime()+5*60000)); const catRef=await db.collection('cats').add(cat); await db.collection('sales').add({ type:'cat', catId:catRef.id, catName:'Безымянный', price:Math.floor(Math.random()*50)+10, bot:true, active:true, createdAt:firebase.firestore.Timestamp.fromDate(now) }); }
    }

    function startBackgroundTasks(){
      setInterval(async ()=>{
        if(!currentUser) return;
        try{
          const now=new Date();
          const kittens=await db.collection('cats').where('owner','==',currentUser.uid).where('age','==','котёнок').get();
          kittens.forEach(async doc=>{ const cat=doc.data(); if(cat.adultAt&&cat.adultAt.toDate()<=now){ await doc.ref.update({ age:'взрослый', adultAt:null }); await db.collection('users').doc(currentUser.uid).collection('notifications').add({ type:'adult', message:`🐱 ${cat.name} вырос!`, catId:doc.id, read:false, timestamp:firebase.firestore.FieldValue.serverTimestamp() }); } });
          const tired=await db.collection('cats').where('owner','==',currentUser.uid).where('state','in',['уставшая','уставший']).get();
          tired.forEach(async doc=>{ const cat=doc.data(); if(cat.tiredUntil&&cat.tiredUntil.toDate()<=now){ await doc.ref.update({ state:'лежит', tiredUntil:null }); } });
          const pregnant=await db.collection('cats').where('owner','==',currentUser.uid).where('isPregnant','==',true).get();
          pregnant.forEach(async doc=>{ const cat=doc.data(); if(cat.pregnancyEnd&&cat.pregnancyEnd.toDate()<=now){ const existNotif=await db.collection('users').doc(currentUser.uid).collection('notifications').where('motherId','==',doc.id).where('type','==','birth_ready').get(); if(existNotif.empty){ await db.collection('users').doc(currentUser.uid).collection('notifications').add({ type:'birth_ready', message:`💥 ${cat.name} готова родить!`, motherId:doc.id, fatherId:cat.fatherId||'unknown', read:false, timestamp:firebase.firestore.FieldValue.serverTimestamp() }); } } });
          checkWalkingReturns(); checkCastleReturns(); checkForestReturns(); checkBeachReturns();
          if(currentUser.email==='katya2013sara1981@gmail.com') botCatRespawn();
        } catch(e){ console.error(e); }
      },10000);
    }

    console.log('🐱 Генетика котов v6.1 готова!');
  </script>
